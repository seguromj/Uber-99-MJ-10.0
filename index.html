<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio 10.0 Ultra - Tablet Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        #adminBtn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 1.5rem; 
            cursor: pointer;
            z-index: 10;
            filter: grayscale(1);
        }

        #historyBtn {
            position: absolute;
            top: 15px;
            left: 65px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            filter: grayscale(1);
        }

        #creditDisplay {
            position: absolute;
            top: 15px;
            right: 15px;
            font-family: monospace;
            color: #888;
            font-size: 1.1rem;
        }
        
        #creditCount { color: #00ff88; font-weight: bold; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-bottom: 2px solid #222;
            position: relative;
        }

        h1 { margin: 0; font-size: 1.2rem; color: #007bff; text-transform: uppercase; letter-spacing: 3px; }
        
        #display {
            font-size: clamp(6rem, 25vw, 12rem); 
            font-weight: 900;
            font-family: 'Courier New', monospace;
            color: #00ff88;
            margin: 0;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        #btnAction {
            width: 80%;
            max-width: 400px; 
            padding: 25px;
            font-size: 1.8rem; 
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background-color: #fff;
            color: #000;
            cursor: pointer;
            box-shadow: 0 8px 0 #ccc;
            touch-action: manipulation;
            z-index: 5;
            outline: none;
        }
        
        #btnAction:active { transform: translateY(4px); box-shadow: 0 4px 0 #999; }
        #btnAction:disabled { background-color: #333 !important; color: #666 !important; box-shadow: none !important; cursor: not-allowed; }

        .side-panel {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(26, 26, 26, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            width: 150px;
            text-align: center;
        }
        .left-panel { left: 20px; }
        .right-panel { right: 20px; }
        .side-panel h3 { font-size: 0.8rem; color: #888; margin: 0 0 5px 0; }
        .side-panel p { font-size: 1.1rem; font-weight: bold; margin: 0; color: #fff; }
        .price-highlight { color: #00ff88; }
        .prize-highlight { color: #ffcc00; }

        #historyList {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
            text-align: left;
        }

        .history-item {
            padding: 8px;
            border-bottom: 1px solid #222;
            font-family: monospace;
            font-size: 0.9rem;
            display: grid;
            grid-template-columns: 1fr auto;
            color: #00ff88;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 35px 20px 20px 20px; /* Aumentado padding superior */
            border-radius: 15px;
            border: 2px solid #444;
            z-index: 1000;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        #winnerModal {
            box-shadow: 0 0 40px rgba(0,255,136,0.25);
        }

        .modal input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 1.2rem; }
        .modal button { background: #00ff88; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 900; }

        .close-modal {
            position: absolute;
            top: 5px;
            right: 10px; /* Mudado para a direita para não tampar o título */
            color: #ff4444;
            font-weight: bold;
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            background: none;
        }
    </style>
</head>
<body tabindex="0">

    <button id="adminBtn" onclick="openAdmin()">🔒</button>
    <button id="historyBtn" onclick="openHistory()">📂</button>
    
    <div id="creditDisplay">TENTATIVAS: <span id="creditCount">0</span></div>

    <div class="game-area">
        <div class="side-panel left-panel">
            <h3>AVULSO</h3>
            <p class="price-highlight">R$ 2,00</p>
            <p style="font-size: 0.7rem; color: #aaa;">1 TENTATIVA</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
            <p style="font-size: 0.8rem; color: red;">PRÊMIO:</p>
            <p class="prize-highlight"><strong style="color: #0dd939;">VIAGEM GRÁTIS</strong></p>
            <p style="font-size: 0.7rem;">Valor de até R$ 10,00</p>
        </div>

        <h1>Tente parar no:<strong style="color: #a90dd9;"> 10.0</strong></h1>
        <div id="display">0.0</div>
        
        <div id="winnerModal" class="modal" style="border-color: #00ff88;">
            <button class="close-modal" onclick="closeModals()">X</button>
            <h2 style="border:none; font-size: 1.5rem; color: #00ff88; margin: 0;">🏆 PARABÉNS!</h2>
            <p style="font-size: 0.9rem;">Você cravou 10.0 perfeitamente!</p>
            <input type="text" id="userName" placeholder="Seu Nome">
            <input type="tel" id="userPhone" placeholder="WhatsApp">
            <button onclick="saveWin()">SALVAR VITÓRIA</button>
        </div>

        <button id="btnAction">INICIAR</button>

        <div class="side-panel right-panel">
            <h3>COMBO</h3>
            <p class="price-highlight">R$ 1,00</p>
            <p style="font-size: 0.7rem; color: #aaa;">2 TENTATIVAS</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
            <p style="font-size: 0.8rem; color: red;">PRÊMIO:</p>
            <p class="prize-highlight"><strong style="color: #0dd939;">R$ 5,00</strong></p>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <button class="close-modal" onclick="closeModals()">X</button>
        <h2 style="color: #00ff88; border-bottom: 1px solid #333; padding-bottom: 10px; margin: 0;">GANHADORES</h2>
        <div id="historyList"></div>
    </div>

    <div id="adminModal" class="modal">
        <button class="close-modal" onclick="closeModals()">X</button>
        <h3 style="margin-top: 0;">ADICIONAR CRÉDITOS</h3>
        <input type="number" id="newCredits" placeholder="0" inputmode="numeric">
        <button onclick="saveCredits()">DEFINIR TENTATIVAS</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <script>
        let timer = null;
        let count = 0.0;
        let running = false;
        let credits = parseInt(localStorage.getItem('gameCredits')) || 0;
        let lockGame = false;

        const display = document.getElementById('display');
        const btnAction = document.getElementById('btnAction');
        const creditCount = document.getElementById('creditCount');
        const overlay = document.getElementById('overlay');
        const historyList = document.getElementById('historyList');

        window.onload = () => {
            const savedHistory = localStorage.getItem('gameHistory');
            if (savedHistory) {
                historyList.innerHTML = savedHistory;
            }
            updateCredits();
        };

        function openAdmin() {
            document.getElementById('newCredits').value = "";
            document.getElementById('adminModal').style.display = 'block';
            overlay.style.display = 'block';
            document.getElementById('newCredits').focus(); // Foca para abrir o teclado
        }

        function openHistory() {
            document.getElementById('historyModal').style.display = 'block';
            overlay.style.display = 'block';
        }

        function saveCredits() {
            credits = parseInt(document.getElementById('newCredits').value) || 0;
            localStorage.setItem('gameCredits', credits);
            lockGame = false; 
            updateCredits();
            closeModals();
        }

        function updateCredits() {
            creditCount.innerText = credits;
            localStorage.setItem('gameCredits', credits);
            btnAction.disabled = (credits <= 0 && !running) || lockGame;
        }

        function gameLoop() {
            count += 0.1;
            display.innerText = count.toFixed(1);
            if (count >= 25.0) stopGame();
        }

        function startGame() {
            if (credits <= 0 || lockGame) return;
            credits--;
            updateCredits();
            
            count = 0.0;
            running = true;
            btnAction.innerText = "PARAR!";
            btnAction.style.backgroundColor = "#ff4444";
            btnAction.style.color = "#fff";
            timer = setInterval(gameLoop, 8); 
        }

        function stopGame() {
            if (!running) return;
            running = false;
            clearInterval(timer);
            btnAction.innerText = "INICIAR";
            btnAction.style.backgroundColor = "#fff";
            btnAction.style.color = "#000";
            
            if (count.toFixed(1) === "10.0") {
                lockGame = true; 
                btnAction.disabled = true;
                setTimeout(() => {
                    document.getElementById('winnerModal').style.display = 'block';
                    overlay.style.display = 'block';
                }, 3000);
            }
            updateCredits();
        }

        function saveWin() {
            const name = document.getElementById('userName').value || "Mestre";
            const phone = document.getElementById('userPhone').value || "S/N";
            const now = new Date();
            const dataStr = now.toLocaleDateString('pt-BR');
            const horaStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            const itemHTML = `
                <div class="history-item">
                    <div><strong>${name}</strong><br><small>${phone}</small></div>
                    <div style="text-align: right;">10.0s<br><small>${dataStr} - ${horaStr}</small></div>
                </div>
            `;
            
            historyList.insertAdjacentHTML('afterbegin', itemHTML);
            localStorage.setItem('gameHistory', historyList.innerHTML);
            
            lockGame = false;
            closeModals();
            updateCredits();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            overlay.style.display = 'none';
            if (count.toFixed(1) === "10.0") {
                lockGame = false;
                updateCredits();
            }
        }

        const handleInteraction = (e) => {
            if (e.type === 'keydown') {
                if (e.code !== 'Space' && e.keyCode !== 32) return;
                e.preventDefault();
            }

            let anyModalOpen = Array.from(document.querySelectorAll('.modal')).some(m => m.style.display === 'block');
            if (anyModalOpen || lockGame) return;

            if (e.cancelable) e.preventDefault(); 
            
            if (!running) {
                if (credits > 0) startGame();
            } else {
                stopGame();
            }
        };

        btnAction.addEventListener('mousedown', handleInteraction);
        btnAction.addEventListener('touchstart', handleInteraction, {passive: false});
        window.addEventListener('keydown', handleInteraction, true);

    </script>
</body>
</html>
