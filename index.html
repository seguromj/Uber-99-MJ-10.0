
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Recorder Pro</title>
    <style>
        body { margin: 0; font-family: 'Courier New', Courier, monospace; background: #000; color: white; overflow: hidden; }
        
        .container { display: flex; height: 100vh; background: #000; position: relative; }
        video#rearCam { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        
        /* Modo Ninja */
        .ninja-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5; 
        }
        #digitalClock { font-size: 24px; color: #333; font-weight: bold; letter-spacing: 2px; }

        /* Ícones */
        .ui-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { font-size: 30px; cursor: pointer; opacity: 0.7; }
        
        /* Controles */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; }
        button#recordBtn { padding: 15px 30px; border-radius: 50px; border: none; background: #ff4444; color: white; font-weight: bold; cursor: pointer; }
        
        #viewBtn { 
            position: absolute; bottom: 20px; left: 20px; z-index: 100; 
            background: transparent; color: #111; border: none; font-size: 10px; display: none;
        }

        /* Galeria */
        #gallery { 
            position: fixed; top: 0; right: -100%; width: 320px; height: 100%; 
            background: rgba(0,0,0,0.98); transition: 0.3s; padding: 15px; overflow-y: auto; z-index: 20; 
        }
        #gallery.open { right: 0; }
        
        #videoList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .video-container { background: #111; border-radius: 5px; padding: 5px; border: 1px solid #222; }
        
        /* Miniatura e Preview */
        .video-thumb { width: 100%; height: 120px; border-radius: 3px; object-fit: cover; background: #000; cursor: pointer; }
        .video-info { font-size: 9px; margin-bottom: 4px; text-align: center; color: #888; }
        .action-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: white; padding: 5px; }

        /* Fullscreen Preview Overlay */
        #videoPreviewOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #previewVideoPlayer { width: 100%; max-height: 80vh; }
    </style>
</head>
<body>

    <button id="viewBtn" onclick="toggleNinjaMode(false)">.</button>

    <div id="ninjaOverlay" class="ninja-screen">
        <div id="digitalClock">00:00</div>
    </div>

    <div class="ui-overlay" id="topIcons">
        <span class="icon" onclick="toggleNinjaMode(true)">🥷</span>
        <span class="icon" onclick="toggleGallery()">📂</span>
    </div>

    <div class="container">
        <video id="rearCam" autoplay playsinline muted></video>
    </div>

    <div class="controls" id="mainControls">
        <button id="recordBtn" onclick="toggleRecording()">INICIAR GRAVAÇÃO</button>
    </div>

    <div id="gallery">
        <h4 style="margin: 0 0 10px 0;">STORAGE (MAX 25)</h4>
        <button onclick="toggleGallery()" style="background:#222; color: #fff; width: 100%; padding: 10px; border: none; margin-bottom: 10px;">FECHAR</button>
        <div id="videoList"></div>
    </div>

    <div id="videoPreviewOverlay">
        <button onclick="closePreview()" style="position:absolute; top:20px; left:20px; background:#444; color:white; border:none; padding:10px 20px; border-radius:5px;">VOLTAR</button>
        <video id="previewVideoPlayer" controls autoplay></video>
        <div style="margin-top: 20px;">
            <button id="previewDownloadBtn" class="action-btn" style="font-size: 30px;">📥</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let intervalId;
        const MAX_VIDEOS = 25;

        const videoElement = document.getElementById('rearCam');
        const recordBtn = document.getElementById('recordBtn');
        const videoList = document.getElementById('videoList');
        const ninjaOverlay = document.getElementById('ninjaOverlay');
        const clockElement = document.getElementById('digitalClock');

        // Atualiza Relógio
        setInterval(() => {
            const now = new Date();
            clockElement.innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 } }, 
                    audio: { autoGainControl: true } 
                }).catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: true }));
                videoElement.srcObject = stream;
            } catch (err) { alert("Erro na câmera: " + err); }
        }

        function toggleNinjaMode(activate) {
            ninjaOverlay.style.display = activate ? 'flex' : 'none';
            document.getElementById('viewBtn').style.display = activate ? 'block' : 'none';
            document.getElementById('mainControls').style.display = activate ? 'none' : 'block';
            document.getElementById('topIcons').style.display = activate ? 'none' : 'flex';
            videoElement.style.opacity = activate ? '0' : '1';
        }

        function toggleRecording() {
            isRecording ? stopRecording() : startRecording();
        }

        function startRecording() {
            isRecording = true;
            recordBtn.innerText = "SISTEMA ATIVO";
            recordBtn.style.background = "#111";
            
            initiateRecorder();

            intervalId = setInterval(() => {
                if (mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop(); // O stop gera o vídeo e o onstop reinicia
                }
            }, 40000);
        }

        function initiateRecorder() {
            recordedChunks = [];
            // Forçar codec comum para evitar vídeos pretos
            mediaRecorder = new MediaRecorder(videoElement.srcObject, {
                mimeType: 'video/webm;codecs=vp8', 
                videoBitsPerSecond: 2000000 
            });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                saveVideo();
                if (isRecording) initiateRecorder(); // Reinicia se ainda estiver no modo gravação
            };

            mediaRecorder.start();
        }

        function stopRecording() {
            clearInterval(intervalId);
            isRecording = false;
            recordBtn.innerText = "INICIAR GRAVAÇÃO";
            recordBtn.style.background = "#ff4444";
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }

        function saveVideo() {
            if (recordedChunks.length === 0) return;
            
            if (videoList.children.length >= MAX_VIDEOS) {
                const last = videoList.lastElementChild;
                URL.revokeObjectURL(last.dataset.url);
                last.remove();
            }

            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const now = new Date();
            const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const fileName = `REC_${timeStr.replace(/:/g,'-')}`;
            
            const container = document.createElement('div');
            container.className = 'video-container';
            container.dataset.url = url;
            container.dataset.name = fileName;
            
            container.innerHTML = `
                <div class="video-info">${timeStr}</div>
                <video src="${url}" class="video-thumb" onclick="openPreview('${url}', '${fileName}')"></video>
                <div style="display:flex; justify-content:center; gap:15px; margin-top:5px;">
                    <button class="action-btn" onclick="downloadVideo('${url}', '${fileName}')">📥</button>
                    <button class="action-btn" onclick="this.closest('.video-container').remove()">🗑️</button>
                </div>
            `;
            videoList.prepend(container);
        }

        function openPreview(url, name) {
            const overlay = document.getElementById('videoPreviewOverlay');
            const player = document.getElementById('previewVideoPlayer');
            const dlBtn = document.getElementById('previewDownloadBtn');
            
            player.src = url;
            dlBtn.onclick = () => downloadVideo(url, name);
            overlay.style.display = 'flex';
        }

        function closePreview() {
            const overlay = document.getElementById('videoPreviewOverlay');
            const player = document.getElementById('previewVideoPlayer');
            player.pause();
            overlay.style.display = 'none';
        }

        function downloadVideo(url, fileName) {
            const a = document.createElement('a');
            a.href = url;
            a.download = `${fileName}.webm`;
            a.click();
        }

        function toggleGallery() { document.getElementById('gallery').classList.toggle('open'); }

        setupCamera();
    </script>
</body>
</html>
