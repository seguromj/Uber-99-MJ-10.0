
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Cam Recorder</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        
        /* Divisão da tela */
        .container { display: flex; flex-direction: column; height: 100vh; }
        video { width: 100%; height: 50%; object-fit: cover; background: #000; border-bottom: 2px solid #333; }

        /* Ícones e Pasta */
        .ui-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { font-size: 30px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        
        /* Botão de Gravar */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #ff4444; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button.recording { background: #222; animation: pulse 1.5s infinite; }

        /* Galeria de Vídeos (Pasta) */
        #gallery { 
            position: fixed; top: 0; right: -100%; width: 250px; height: 100%; 
            background: rgba(0,0,0,0.9); transition: 0.3s; padding: 20px; overflow-y: auto; z-index: 20; 
        }
        #gallery.open { right: 0; }
        .video-item { margin-bottom: 15px; width: 100%; border: 1px solid #444; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <span class="icon" title="Confiança">🛡️</span>
        <span class="icon" onclick="toggleGallery()" title="Vídeos Salvos">📂</span>
    </div>

    <div class="container">
        <video id="frontCam" autoplay playsinline muted></video>
        <video id="backCam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button id="recordBtn" onclick="toggleRecording()">INICIAR GRAVAÇÃO</button>
    </div>

    <div id="gallery">
        <h3>Vídeos Salvos</h3>
        <button onclick="toggleGallery()" style="background:#444; margin-bottom: 10px;">Fechar</button>
        <div id="videoList"></div>
    </div>

    <script>
        let mediaRecorders = [];
        let recordedChunks = [[], []];
        let isRecording = false;
        let intervalId;

        const frontVideo = document.getElementById('frontCam');
        const backVideo = document.getElementById('backCam');
        const recordBtn = document.getElementById('recordBtn');
        const videoList = document.getElementById('videoList');

        // Inicializa as câmeras
        async function setupCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');

                // Tenta pegar a frontal (user)
                const streamFront = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                frontVideo.srcObject = streamFront;

                // Tenta pegar a traseira (environment)
                const streamBack = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                }).catch(() => navigator.mediaDevices.getUserMedia({ video: true })); // fallback se falhar
                
                backVideo.srcObject = streamBack;
            } catch (err) {
                alert("Erro ao acessar câmeras: " + err);
            }
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            recordBtn.innerText = "PARAR GRAVAÇÃO (1m)";
            recordBtn.classList.add('recording');
            
            initiateRecorders();

            // Ciclo de 1 minuto (60000ms)
            intervalId = setInterval(() => {
                stopRecording(true); // Para e salva
                startRecording();    // Reinicia novo bloco
            }, 60000);
        }

        function initiateRecorders() {
            const streams = [frontVideo.srcObject, backVideo.srcObject];
            mediaRecorders = [];
            recordedChunks = [[], []];

            streams.forEach((stream, index) => {
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks[index].push(e.data);
                };
                recorder.onstop = () => saveVideo(index);
                recorder.start();
                mediaRecorders.push(recorder);
            });
        }

        function stopRecording(isAutoCycle = false) {
            if (!isAutoCycle) {
                clearInterval(intervalId);
                isRecording = false;
                recordBtn.innerText = "INICIAR GRAVAÇÃO";
                recordBtn.classList.remove('recording');
            }
            mediaRecorders.forEach(r => r.stop());
        }

        function saveVideo(index) {
            const blob = new Blob(recordedChunks[index], { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const name = (index === 0 ? "Frontal" : "Traseira") + " - " + new Date().toLocaleTimeString();
            
            const vElement = document.createElement('video');
            vElement.src = url;
            vElement.className = 'video-item';
            vElement.controls = true;
            
            const label = document.createElement('p');
            label.innerText = name;
            label.style.fontSize = "12px";

            videoList.prepend(label);
            videoList.prepend(vElement);
        }

        function toggleGallery() {
            document.getElementById('gallery').classList.toggle('open');
        }

        setupCameras();
    </script>
</body>
</html>
