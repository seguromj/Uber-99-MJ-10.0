
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Recorder Pro</title>
    <style>
        body { margin: 0; font-family: 'Courier New', Courier, monospace; background: #000; color: white; overflow: hidden; }
        
        .container { display: flex; height: 100vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        
        /* Modo Ninja - Relógio Digital Discreto */
        .ninja-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5; 
        }
        #digitalClock { font-size: 24px; color: #333; font-weight: bold; letter-spacing: 2px; }

        /* Ícones e Pasta */
        .ui-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { font-size: 30px; cursor: pointer; opacity: 0.7; }
        
        /* Controles Principais */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #ff4444; color: white; font-weight: bold; cursor: pointer; }
        
        /* Botão Ver Invisível (sobre o relógio) */
        #viewBtn { 
            position: absolute; bottom: 20px; left: 20px; z-index: 100; 
            background: rgba(20, 20, 20, 0.2); padding: 10px; border-radius: 5px; 
            font-size: 10px; color: #111; display: none; border: none;
        }

        #gallery { 
            position: fixed; top: 0; right: -100%; width: 300px; height: 100%; 
            background: rgba(0,0,0,0.98); transition: 0.3s; padding: 15px; overflow-y: auto; z-index: 20; 
        }
        #gallery.open { right: 0; }
        
        #videoList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .video-container { background: #111; border-radius: 5px; padding: 5px; border: 1px solid #222; }
        .video-item { width: 100%; border-radius: 3px; }
        .video-info { font-size: 9px; margin: 4px 0; text-align: center; color: #888; }
        .action-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: white; padding: 2px; }
    </style>
</head>
<body>

    <button id="viewBtn" onclick="toggleNinjaMode(false)">.</button>

    <div id="ninjaOverlay" class="ninja-screen">
        <div id="digitalClock">00:00</div>
    </div>

    <div class="ui-overlay" id="topIcons">
        <span class="icon" onclick="toggleNinjaMode(true)">🥷</span>
        <span class="icon" onclick="toggleGallery()">📂</span>
    </div>

    <div class="container">
        <video id="rearCam" autoplay playsinline muted></video>
    </div>

    <div class="controls" id="mainControls">
        <button id="recordBtn" onclick="toggleRecording()">INICIAR GRAVAÇÃO</button>
    </div>

    <div id="gallery">
        <h4 style="margin: 0 0 10px 0; font-size: 14px;">STORAGE (MAX 25)</h4>
        <button onclick="toggleGallery()" style="background:#222; color: #666; width: 100%; padding: 5px; border: none; margin-bottom: 10px;">FECHAR</button>
        <div id="videoList"></div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let intervalId;
        const MAX_VIDEOS = 25;

        const videoElement = document.getElementById('rearCam');
        const recordBtn = document.getElementById('recordBtn');
        const videoList = document.getElementById('videoList');
        const ninjaOverlay = document.getElementById('ninjaOverlay');
        const viewBtn = document.getElementById('viewBtn');
        const clockElement = document.getElementById('digitalClock');
        const mainControls = document.getElementById('mainControls');
        const topIcons = document.getElementById('topIcons');

        // Atualiza o Relógio Digital
        setInterval(() => {
            const now = new Date();
            clockElement.innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 } }, 
                    audio: { 
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true // Ajuste automático de volume
                    } 
                }).catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: true }));
                videoElement.srcObject = stream;
            } catch (err) { alert("Erro na câmera: " + err); }
        }

        function toggleNinjaMode(activate) {
            if (activate) {
                ninjaOverlay.style.display = 'flex';
                viewBtn.style.display = 'block';
                mainControls.style.display = 'none';
                topIcons.style.display = 'none';
                videoElement.style.opacity = '0';
            } else {
                ninjaOverlay.style.display = 'none';
                viewBtn.style.display = 'none';
                mainControls.style.display = 'block';
                topIcons.style.display = 'flex';
                videoElement.style.opacity = '1';
            }
        }

        function toggleRecording() {
            if (isRecording) { stopRecording(); } 
            else { startRecording(); }
        }

        function startRecording() {
            isRecording = true;
            recordBtn.innerText = "SISTEMA ATIVO";
            recordBtn.style.background = "#111";
            recordBtn.style.color = "#444";
            
            initiateRecorder();

            intervalId = setInterval(() => {
                stopRecording(true);
                startRecording();
            }, 40000); 
        }

        function initiateRecorder() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(videoElement.srcObject, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 2500000 
            });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveVideo;
            mediaRecorder.start();
        }

        function stopRecording(isAutoCycle = false) {
            if (!isAutoCycle) {
                clearInterval(intervalId);
                isRecording = false;
                recordBtn.innerText = "INICIAR GRAVAÇÃO";
                recordBtn.style.background = "#ff4444";
                recordBtn.style.color = "white";
            }
            if (mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); }
        }

        function saveVideo() {
            if (recordedChunks.length === 0) return;
            
            // Gerenciamento de Limite (25 vídeos)
            if (videoList.children.length >= MAX_VIDEOS) {
                const lastVideo = videoList.lastElementChild;
                const videoTag = lastVideo.querySelector('video');
                if (videoTag) URL.revokeObjectURL(videoTag.src);
                lastVideo.remove();
            }

            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('pt-BR').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const fileName = `REC_${dateStr}_${timeStr.replace(':','-')}`;
            
            const container = document.createElement('div');
            container.className = 'video-container';
            container.innerHTML = `
                <div class="video-info">${dateStr} | ${timeStr}</div>
                <video src="${url}" class="video-item" onclick="this.paused ? this.play() : this.pause()"></video>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:4px;">
                    <button class="action-btn" onclick="downloadVideo('${url}', '${fileName}')">📥</button>
                    <button class="action-btn" onclick="this.closest('.video-container').remove()">🗑️</button>
                </div>
            `;
            videoList.prepend(container);
        }

        function downloadVideo(url, fileName) {
            const a = document.createElement('a');
            a.href = url;
            a.download = `${fileName}.webm`;
            a.click();
        }

        function toggleGallery() { document.getElementById('gallery').classList.toggle('open'); }

        setupCamera();
    </script>
</body>
</html>
