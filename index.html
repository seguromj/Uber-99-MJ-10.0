
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality Rear Recorder</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        
        /* Câmera única ocupando a tela inteira */
        .container { display: flex; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Ícones e Pasta */
        .ui-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon { font-size: 30px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        
        /* Botão de Gravar */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #ff4444; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button.recording { background: #222; animation: pulse 1.5s infinite; }

        /* Galeria */
        #gallery { 
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%; 
            background: rgba(0,0,0,0.9); transition: 0.3s; padding: 20px; overflow-y: auto; z-index: 20; 
        }
        #gallery.open { right: 0; }
        .video-container { margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .video-item { width: 100%; border: 1px solid #444; }
        .video-actions { display: flex; justify-content: space-around; margin-top: 8px; }
        .action-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <span class="icon" title="Confiança">🛡️</span>
        <span class="icon" onclick="toggleGallery()" title="Vídeos Salvos">📂</span>
    </div>

    <div class="container">
        <video id="rearCam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button id="recordBtn" onclick="toggleRecording()">INICIAR GRAVAÇÃO</button>
    </div>

    <div id="gallery">
        <h3>Vídeos Salvos</h3>
        <button onclick="toggleGallery()" style="background:#444; margin-bottom: 10px; border-radius: 5px; padding: 5px 15px;">Fechar</button>
        <div id="videoList"></div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let intervalId;

        const videoElement = document.getElementById('rearCam');
        const recordBtn = document.getElementById('recordBtn');
        const videoList = document.getElementById('videoList');

        async function setupCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 4096 }, // Tenta 4K
                    height: { ideal: 2160 }
                },
                audio: true
            };

            try {
                // Tenta câmera traseira com alta qualidade
                const stream = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => {
                        // Fallback caso "exact" falhe em alguns navegadores
                        return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    });
                
                videoElement.srcObject = stream;
            } catch (err) {
                alert("Erro ao acessar câmera traseira: " + err);
            }
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            recordBtn.innerText = "GRAVANDO (1m)...";
            recordBtn.classList.add('recording');
            
            initiateRecorder();

            intervalId = setInterval(() => {
                stopRecording(true);
                startRecording();
            }, 60000);
        }

        function initiateRecorder() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(videoElement.srcObject, {
                mimeType: 'video/webm;codecs=vp9', // Melhor codec para qualidade/tamanho
                videoBitsPerSecond: 5000000 // 5Mbps para boa qualidade
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = saveVideo;
            mediaRecorder.start();
        }

        function stopRecording(isAutoCycle = false) {
            if (!isAutoCycle) {
                clearInterval(intervalId);
                isRecording = false;
                recordBtn.innerText = "INICIAR GRAVAÇÃO";
                recordBtn.classList.remove('recording');
            }
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }

        function saveVideo() {
            if (recordedChunks.length === 0) return;

            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const timestamp = new Date().toLocaleTimeString();
            const fileName = `HD_Rear_${timestamp}.webm`;
            
            const container = document.createElement('div');
            container.className = 'video-container';
            
            const vElement = document.createElement('video');
            vElement.src = url;
            vElement.className = 'video-item';
            vElement.controls = true;
            
            const label = document.createElement('p');
            label.innerText = `Traseira - ${timestamp}`;
            label.style.fontSize = "12px";
            label.style.margin = "5px 0";

            const actions = document.createElement('div');
            actions.className = 'video-actions';

            const downloadBtn = document.createElement('button');
            downloadBtn.innerHTML = "📥";
            downloadBtn.className = "action-btn";
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = "🗑️";
            deleteBtn.className = "action-btn";
            deleteBtn.onclick = () => {
                URL.revokeObjectURL(url);
                container.remove();
            };

            actions.appendChild(downloadBtn);
            actions.appendChild(deleteBtn);

            container.appendChild(label);
            container.appendChild(vElement);
            container.appendChild(actions);
            
            videoList.prepend(container);
        }

        function toggleGallery() {
            document.getElementById('gallery').classList.toggle('open');
        }

        setupCamera();
    </script>
</body>
</html>
